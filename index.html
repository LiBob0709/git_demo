<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Frontend</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .card {
            text-align: center; padding: 3rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 1rem; border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        p { font-size: 1.2rem; opacity: 0.9; }
        .version { margin-top: 1.5rem; font-size: 0.9rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Demo Frontend</h1>
        <p>Zadig DevOps Agent 部署测试项目</p>
        <div class="version">v1.0.0 | 部署时间将由 CI/CD 自动更新</div>
    </div>
</body>
</html>
